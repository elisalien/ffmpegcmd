<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFmpeg Command Generator</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #16161a; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; border: 1px solid #333; }
        h2 { color: var(--neon); margin-top: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; }
        label { display: block; margin: 15px 0 5px; font-size: 0.9rem; color: #bbb; }
        input, select { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        input:focus { border-color: var(--neon); outline: none; }
        .output-box { margin-top: 25px; background: #000; padding: 15px; border-left: 4px solid var(--neon); position: relative; }
        code { word-break: break-all; font-family: 'Consolas', monospace; font-size: 0.9rem; color: #adff2f; }
        button { background: var(--neon); color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; transition: 0.3s; }
        button:hover { background: #00c8d4; transform: translateY(-2px); }
        .copy-hint { font-size: 0.7rem; color: var(--neon); margin-top: 5px; text-align: right; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚡ FFmpeg Generator</h2>
    
    <label>Chemin vers ffmpeg.exe</label>
    <input type="text" id="exePath" value="C:\ffmpeg\bin\ffmpeg.exe" oninput="generate()">

    <label>Chemin du fichier source (MKV/MP4...)</label>
    <input type="text" id="videoPath" placeholder="C:\Users\Nom\Downloads\video.mkv" oninput="generate()">

    <label>Qualité (CRF : 17 = Top, 23 = Standard)</label>
    <input type="number" id="crf" value="17" min="0" max="51" oninput="generate()">

    <label>Vitesse d'encodage (Preset)</label>
    <select id="preset" onchange="generate()">
        <option value="ultrafast">Ultrafast (Rapide, gros fichier)</option>
        <option value="medium">Medium (Equilibré)</option>
        <option value="slow" selected>Slow (Meilleure compression)</option>
        <option value="veryslow">VerySlow (Optimisation maximale)</option>
    </select>

    <div class="output-box">
        <code id="resultCommand">Remplissez les champs pour générer la commande...</code>
    </div>
    <button onclick="copyCmd()">Copier la commande</button>
    <div id="status" class="copy-hint"></div>
</div>

<script>
    function generate() {
        const exe = document.getElementById('exePath').value || 'ffmpeg';
        const input = document.getElementById('videoPath').value || '[CHEMIN_ENTREE]';
        const crf = document.getElementById('crf').value;
        const preset = document.getElementById('preset').value;
        
        // Génération du nom de sortie automatique
        let output = input.replace(/\.[^/.]+$/, "") + "_converted.mp4";
        if(input === '[CHEMIN_ENTREE]') output = '[CHEMIN_SORTIE].mp4';

        const cmd = `"${exe}" -i "${input}" -c:v libx264 -crf ${crf} -preset ${preset} -c:a aac -b:a 320k "${output}"`;
        
        document.getElementById('resultCommand').innerText = cmd;
    }

    function copyCmd() {
        const text = document.getElementById('resultCommand').innerText;
        navigator.clipboard.writeText(text);
        const status = document.getElementById('status');
        status.innerText = "Copié dans le presse-papier ! ✅";
        setTimeout(() => status.innerText = "", 2000);
    }

    // Initialisation
    generate();
</script>

</body>
</html>
